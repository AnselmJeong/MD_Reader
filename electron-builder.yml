appId: com.mdreader.app
productName: MD Reader
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: tts
    to: tts
    filter:
      - pyproject.toml
      - uv.lock
      - reader_tts_server.py
      - README.md
      - voices/**/*
mac:
  target: dmg
  icon: build/icon.png
  category: public.app-category.productivity
dmg:
  title: "${productName} ${version}"
  icon: build/icon.png
